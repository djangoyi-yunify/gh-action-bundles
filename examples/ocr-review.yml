name: OCR Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  ocr-review:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request_target' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && startsWith(github.event.comment.body, '/ocr'))
    steps:
      - name: Get PR context for comment trigger
        if: github.event_name == 'issue_comment'
        id: pr-context
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('head_sha', pr.head.sha);

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || steps.pr-context.outputs.head_sha }}
          persist-credentials: false

      - name: Run OCR review
        uses: your-org/gh-action-bundles/actions/ocr-review@main
        with:
          llm-url: ${{ secrets.OCR_LLM_URL }}
          llm-token: ${{ secrets.OCR_LLM_AUTH_TOKEN }}
          llm-model: ${{ secrets.OCR_LLM_MODEL }}
          pr-number: ${{ github.event.pull_request.number || github.event.issue.number }}
          background: ${{ github.event.pull_request.title }}
